name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Smoke test
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: error

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30
          if-no-files-found: error

  migrate:
    name: Migrate database
    runs-on: ubuntu-22.04
    needs: lint-build-test
    # Run only when a PR is merged to main (push event on main branch).
    # Skipped on pull_request events — lint/build/test is sufficient for PRs.
    #
    # NOTE: To fully gate Vercel deploys on migration success, enable
    # "Require CI to pass before deploying" in the Vercel project's GitHub
    # integration settings. This is a manual operator step in the Vercel
    # dashboard, not a code change.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin to immutable release tag — update intentionally; see https://github.com/supabase/setup-cli/releases
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1.7.1
        with:
          # Pinned to avoid unexpected CLI breaking changes; update intentionally.
          version: 2.22.6

      - name: Apply database migrations
        # Required GitHub secrets (repo Settings → Secrets and variables → Actions):
        #   SUPABASE_ACCESS_TOKEN — personal access token from
        #     https://supabase.com/dashboard/account/tokens
        #   SUPABASE_PROJECT_REF  — production project Reference ID
        #     (Supabase Project Settings → General → Reference ID)
        #   SUPABASE_DB_PASSWORD  — production database password
        #     (Supabase Project Settings → Database → Database password)
        #
        # CLI 2.x removed --project-ref from `db push`; link first, then push.
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          supabase db push --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
